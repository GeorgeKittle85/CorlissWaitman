<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Student Tools</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .page-container {
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .page-header {
      margin-bottom: 32px;
    }
    .back-link {
      color: var(--accent-cyan);
      text-decoration: none;
      display: inline-block;
      margin-bottom: 16px;
    }
    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<div class="page-container">
  <a href="index.html" class="back-link">&larr; Back</a>

  <div class="page-header">
    <h1>Contact Us</h1>
    <p style="color: var(--text-secondary); margin-top: 8px;">Have questions or feedback? We'd love to hear from you.</p>
  </div>

  <div class="card">
    <p style="color: var(--text-secondary); line-height: 1.6;">
      Thank you for using Student Tools! For support, feedback, or inquiries, please reach out to us.
    </p>
    <p style="color: var(--text-muted); margin-top: 16px; font-size: 14px;">
      Email: support@studenttools.com<br>
      Response time: Usually within 24 hours
    </p>
  </div>

  <div style="text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 13px;">
    <a href="terms.html" style="color: var(--accent-cyan); text-decoration: none; margin-right: 12px;">Terms</a> &middot;
    <a href="privacy.html" style="color: var(--accent-cyan); text-decoration: none; margin-left: 12px;">Privacy</a>
  </div>
</div>

</body>
</html>
